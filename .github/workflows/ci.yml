name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean:
    name: Build proofs + no-sorry + book renderer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          large-packages: false
          docker-images: false
          swap-storage: false

      # lean-action installs elan, fetches the Mathlib olean cache, and builds
      # the default target (the QuantumBook library). Pinned to a commit SHA.
      - name: Build QuantumBook (elan + Mathlib cache)
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # 2025-07-02
        with:
          build: true
          lint: false
          test: false

      - name: No-sorry check (fails the build on any sorry)
        run: make verify-no-sorry

      - name: Build the book renderer + blueprint decl check
        run: |
          make book-exe
          make check-blueprint

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: make lint-shell

  links:
    name: Check links (no dead links)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # Install a pinned lychee binary from its GitHub release. `gh` is
      # preinstalled on the runner; the glob pattern avoids hard-coding the
      # exact asset filename. `make check-links` is the single source of truth
      # for what gets checked (per the Makefile-targets rule).
      - name: Install lychee
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download lychee-v0.24.2 --repo lycheeverse/lychee \
            --pattern '*x86_64-unknown-linux-gnu.tar.gz' --output lychee.tar.gz
          tar -xzf lychee.tar.gz --wildcards --strip-components=1 '*/lychee'
          sudo install -m 0755 lychee /usr/local/bin/lychee
          lychee --version
      - name: Check links
        run: make check-links
