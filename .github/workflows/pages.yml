name: Deploy book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and mint an id-token for it.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Render the interactive HTML book
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          large-packages: false
          docker-images: false
          swap-storage: false

      # lean-action installs elan, fetches the Mathlib cache, and builds the
      # library; the render step below builds the book executable and emits HTML.
      - name: Build QuantumBook (elan + Mathlib cache)
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # 2025-07-02
        with:
          build: true
          lint: false
          test: false

      - name: Render the book to _site
        run: |
          make book-html
          mkdir -p _site
          cp -r build/book/html-multi/. _site/
          # Narrated video reels (generated locally with macOS `say`; CI can only
          # copy the committed mp4s, see DECISIONS.md ADR-0012).
          mkdir -p _site/watch
          cp -r media/reels/. _site/watch/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
